<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${quiz.title} + ' - CodeEdu'">퀴즈</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .quiz-take-wrap { max-width: 700px; margin: 40px auto 80px; padding: 0 16px; }

        .quiz-info-bar {
            background: var(--white); border-radius: 20px; padding: 20px 28px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05); border: 1px solid #eee; margin-bottom: 16px;
        }
        .quiz-info-title { font-size: 1.2rem; font-weight: 900; color: var(--text); }
        .quiz-topic { font-size: .85rem; color: #888; font-weight: 700; margin-bottom: 4px; }
        .quiz-timer { font-size: 1rem; font-weight: 900; color: var(--blue); background: var(--blue-light); padding: 7px 16px; border-radius: 50px; }

        .progress-wrap { margin-bottom: 6px; }
        .progress-bar { height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--blue); border-radius: 10px; transition: width .4s; }
        .progress-label { display: flex; justify-content: space-between; font-size: .8rem; color: #888; margin-top: 6px; margin-bottom: 24px; }

        /* 문제 카드 - 기본 숨김 */
        .q-card { display: none; background: var(--white); border-radius: 20px; padding: 32px; box-shadow: 0 4px 16px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .q-card.active { display: block; }

        .q-num { font-size: .85rem; font-weight: 800; color: var(--blue); margin-bottom: 12px; }
        .q-text { font-size: 1.1rem; font-weight: 800; color: var(--text); line-height: 1.6; margin-bottom: 24px; }

        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-label {
            display: flex; align-items: center; gap: 14px; padding: 16px 20px;
            border-radius: 14px; border: 2px solid #eaeaea; cursor: pointer;
            transition: all .2s; background: #fafafa;
        }
        .choice-label:hover { border-color: var(--blue); background: var(--blue-light); }
        .choice-label input[type="radio"] { display: none; }
        .choice-label:has(input:checked) { border-color: var(--blue); background: var(--blue-light); }
        .choice-marker {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: .85rem; flex-shrink: 0; background: white; transition: all .2s;
        }
        .choice-label:has(input:checked) .choice-marker { background: var(--blue); border-color: var(--blue); color: white; }
        .choice-text { font-size: 1rem; color: #333; font-weight: 600; }

        /* 미선택 경고 */
        .no-answer-msg {
            display: none; color: #C62828; font-size: .85rem; font-weight: 700;
            margin-top: 14px; padding: 10px 16px; background: #FFEBEE;
            border-radius: 8px; border-left: 4px solid #C62828;
        }

        /* 네비게이션 버튼 */
        .nav-btns {
            display: flex; gap: 12px; margin-top: 24px; justify-content: space-between;
        }
        .btn-prev {
            padding: 14px 28px; border-radius: 50px; border: 2px solid #eaeaea;
            background: var(--white); color: var(--text-sub); font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: all .2s;
        }
        .btn-prev:hover { border-color: var(--blue); color: var(--blue); }
        .btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-next {
            flex: 1; padding: 14px; border-radius: 50px; border: none;
            background: var(--blue); color: white; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: all .2s;
        }
        .btn-next:hover { background: var(--blue-mid); transform: translateY(-2px); }
        .btn-submit-quiz {
            flex: 1; padding: 14px; border-radius: 50px; border: none;
            background: #2E7D32; color: white; font-size: 1rem; font-weight: 800;
            cursor: pointer; transition: all .2s; box-shadow: 0 4px 14px rgba(46,125,50,0.3);
        }
        .btn-submit-quiz:hover { background: #1B5E20; transform: translateY(-2px); }
    </style>
</head>
<body style="background: var(--gray);">

<!-- NAV -->
<nav th:replace="~{index :: nav}"></nav>

<div class="quiz-take-wrap">
    <!-- 상단 정보 바 -->
    <div class="quiz-info-bar">
        <div>
            <div class="quiz-topic" th:text="${quiz.icon + ' ' + quiz.topic}">⚡ JavaScript</div>
            <div class="quiz-info-title" th:text="${quiz.title}">퀴즈 제목</div>
        </div>
        <div style="display:flex; gap:16px; align-items:center; font-size:.9rem; color:#666;">
            <span th:text="'📋 ' + ${quiz.questionCount} + '문제'">📋 5문제</span>
            <div class="quiz-timer">⏱️ <span id="timer-display" th:attr="data-seconds=${quiz.timeLimit * 60}">00:00</span></div>
        </div>
    </div>

    <!-- 진행률 -->
    <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label">
            <span id="progress-text">1번째 문제</span>
            <span><span id="current-num">1</span> / <span th:text="${quiz.questionCount}">5</span></span>
        </div>
    </div>

    <!-- 퀴즈 폼 (모든 문제 포함, JS로 한 번에 하나씩 노출) -->
    <form id="quiz-form" th:action="@{/quiz/{id}/submit(id=${quiz.id})}" method="POST">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div th:each="question, stat : ${quiz.questions}"
             class="q-card"
             th:classappend="${stat.first} ? 'active'"
             th:attr="data-index=${stat.index}">
            <div class="q-num" th:text="'Q' + ${stat.count} + ' / ' + ${quiz.questionCount}">Q1 / 5</div>
            <div class="q-text" th:text="${question.questionText}">문제 내용</div>
            <div class="choices">
                <label th:each="choice, ci : ${question.choices}" class="choice-label">
                    <input type="radio"
                           th:name="'answer_' + ${question.id}"
                           th:value="${choice.id}"
                           class="q-radio">
                    <div class="choice-marker"
                         th:text="${ci.index == 0 ? 'A' : ci.index == 1 ? 'B' : ci.index == 2 ? 'C' : 'D'}">A</div>
                    <span class="choice-text" th:text="${choice.choiceText}">선택지</span>
                </label>
            </div>
            <div class="no-answer-msg" id="no-answer-msg">⚠️ 답을 선택해주세요!</div>
        </div>

        <!-- 네비게이션 -->
        <div class="nav-btns">
            <button type="button" class="btn-prev" id="btn-prev" onclick="prevQuestion()" disabled>← 이전</button>
            <button type="button" class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
            <button type="submit" class="btn-submit-quiz" id="btn-submit" style="display:none;"
                    onclick="return confirm('퀴즈를 제출하시겠습니까?')">✅ 제출하기</button>
        </div>
    </form>
</div>

<!-- FOOTER -->
<footer th:replace="~{index :: footer}"></footer>

<script>
    const cards = document.querySelectorAll('.q-card');
    const total = cards.length;
    let current = 0;

    function showQuestion(idx) {
        cards.forEach(c => c.classList.remove('active'));
        cards[idx].classList.add('active');

        // 미선택 경고 숨김
        document.getElementById('no-answer-msg').style.display = 'none';

        // 이전 버튼
        document.getElementById('btn-prev').disabled = (idx === 0);

        // 마지막 문제면 제출 버튼, 아니면 다음 버튼
        const isLast = (idx === total - 1);
        document.getElementById('btn-next').style.display   = isLast ? 'none'  : 'block';
        document.getElementById('btn-submit').style.display = isLast ? 'block' : 'none';

        // 진행률 업데이트
        const pct = ((idx + 1) / total) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('current-num').textContent = idx + 1;
        document.getElementById('progress-text').textContent = `${idx + 1}번째 문제`;

        current = idx;
    }

    function isCurrentAnswered() {
        const card = cards[current];
        const radios = card.querySelectorAll('input[type="radio"]');
        const name = radios[0]?.name;
        return name ? !!document.querySelector(`input[name="${name}"]:checked`) : false;
    }

    function nextQuestion() {
        if (!isCurrentAnswered()) {
            document.getElementById('no-answer-msg').style.display = 'block';
            return;
        }
        if (current < total - 1) showQuestion(current + 1);
    }

    function prevQuestion() {
        if (current > 0) showQuestion(current - 1);
    }

    // 타이머
    const timerEl = document.getElementById('timer-display');
    let remaining = parseInt(timerEl.dataset.seconds, 10);
    function updateTimer() {
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        timerEl.textContent = m + ':' + s;
        if (remaining <= 60) timerEl.style.color = '#C62828';
    }
    updateTimer();
    const iv = setInterval(() => {
        if (remaining <= 0) { clearInterval(iv); timerEl.textContent = '시간 초과!'; return; }
        remaining--;
        updateTimer();
    }, 1000);
</script>
</body>
</html>
